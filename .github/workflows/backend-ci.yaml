name: Backend CI & Manifest Update

on:
  push:
    branches:
      - develop
      - staging
      - main
      - master
    paths:
      - 'backend/**'       # Chỉ trigger khi có thay đổi trong thư mục backend
      - '.github/workflows/backend-ci.yaml'

env:
  PROJECT_ID: "lab-gke-485602" # Thay bằng Project ID của bạn
  REGION: "us-central1"
  AR_REPO: "lab-gke-485602-dev-registry" # Tên repository trên Artifact Registry
  IMAGE_NAME: "backend-api"
  MANIFEST_REPO: "nghieptb11/lab-gke-manifests"
  APP_HELM_DIR: "application-helm-charts/lab-gke-backend"
  

jobs:
  build-push-update:
    name: Build, Push and Update Manifest
    runs-on: ubuntu-latest
    
    # Bắt buộc khai báo permissions này để WIF hoạt động (sinh OIDC token)
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      # 1. Checkout Application Code
      - name: Checkout Code
        uses: actions/checkout@v4

# 2. Map nhánh Code với nhánh Manifest
      - name: Determine Manifest Branch
        id: branch_mapping
        run: |
          echo "Source code branch is: ${{ github.ref_name }}"
          if [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "TARGET_BRANCH=dev" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "TARGET_BRANCH=staging" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "master" ]]; then
            echo "TARGET_BRANCH=main" >> $GITHUB_ENV
          else
            echo "Branch not mapped for deployment. Exiting."
            exit 1
          fi
          echo "Target manifest branch will be: $TARGET_BRANCH"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      # Authenticate Docker to Google Cloud Artifact Registry
      - name: 'Docker Auth'
        uses: 'docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567' # docker/login-action@v3
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.auth_token }}'
          registry: '${{ env.REGION }}-docker.pkg.dev'

      # Build the Docker image
      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend  # [SỬA LỖI]: Trỏ chính xác vào thư mục chứa code và Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha # Pull cache từ GitHub Actions
          cache-to: type=gha,mode=max # Lưu cache lại cho lần sau

      # Generate temporary token from GitHub App
      - name: Generate token from GitHub App
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MANIFEST_APP_ID }}
          private-key: ${{ secrets.MANIFEST_APP_PRIVATE_KEY }}
          owner: nghieptb11
          repositories: "lab-gke-manifests"

      # Checkout repo manifest use temporary token
      - name: Checkout Manifest Repository
        uses: actions/checkout@v4
        with:
          repository: nghieptb11/lab-gke-manifests
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ env.TARGET_BRANCH }}
          path: manifests-repo


      # Update file values.yaml and Push
      - name: Update Helm Values & Push
        run: |
          cd manifests-repo/${{ env.APP_HELM_DIR }}
          
          # Sử dụng yq (được cài sẵn trên runner ubuntu-latest) để sửa yaml an toàn
          # Giả định cấu trúc values.yaml của bạn có block: image: \n tag: "1.0.4"
          yq e -i '.image.tag = "${{ github.sha }}"' values.yaml
          
          # Cấu hình Git Bot
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Kiểm tra xem file có thực sự thay đổi không
          if [[ -n "$(git status --porcelain)" ]]; then
            git add values.yaml
            git commit -m "chore(backend): update image tag to ${{ github.sha }} on ${{ env.TARGET_BRANCH }}"
            
            # Push thẳng lên nhánh (Vì đã thống nhất chiến lược branch-based không merge)
            git push origin ${{ env.TARGET_BRANCH }}
            echo "Successfully updated manifest repository."
          else
            echo "No changes detected in values.yaml."
          fi