server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Endpoint cho GKE Healthcheck
    location /health {
        access_log off;
        return 200 'OK';
    }
    location /api/ {
        # Trong GKE, chúng ta dùng tên Service của Backend
        proxy_pass http://lab-gke-backend-svc:3000; 
    }
}